# ClawLite Configuration
# Copy this file to config.yaml and customize

# Access control
access:
  # Allowed users (empty = all allowed, list = only those)
  # Use prefixed IDs: tg_<id> for Telegram, wa_<id> for WhatsApp
  allowed_users: []
  
  # Admin users (always allowed + bypass tool restrictions)
  # Example: ["tg_123456", "wa_628123456"]
  admins: []

# LLM settings
llm:
  # Provider: ollama | openrouter | anthropic
  provider: ollama
  
  # Ollama settings
  model: llama3.2:3b
  host: http://localhost:11434
  timeout: 60
  
  # OpenRouter settings (if provider: openrouter)
  # openrouter_model: google/gemini-2.0-flash-001
  # openrouter_api_key: ${OPENROUTER_API_KEY}
  
  # Anthropic settings (if provider: anthropic)
  # anthropic_model: claude-sonnet-4-20250514
  # 
  # Auth option 1: API Key (from Anthropic Console)
  # anthropic_api_key: ${ANTHROPIC_API_KEY}
  # 
  # Auth option 2: OAuth Token (from `claude setup-token`)
  # anthropic_auth_token: ${ANTHROPIC_AUTH_TOKEN}
  # 
  # If both set, OAuth token takes precedence.
  # 
  # Extended thinking (Claude Sonnet/Opus feature)
  # anthropic_extended_thinking: true  # Enable by default
  # anthropic_thinking_budget: 10000   # Max thinking tokens

# Agent behavior
agent:
  max_iterations: 10
  tool_timeout: 30        # seconds per tool execution
  total_timeout: 300      # 5 min max per conversation turn
  retry_attempts: 3       # LLM retry attempts

# Tool settings
tools:
  # Allowed tools (empty = all tools enabled)
  # Example: only enable specific tools
  # allowed:
  #   - read_file
  #   - write_file
  #   - web_search
  allowed: []
  
  # Per-tool configuration
  options:
    web_search:
      max_results: 5
    web_fetch:
      max_chars: 10000

# Channel settings
channels:
  telegram:
    enabled: true
  whatsapp:
    enabled: false

# Conversation persistence
conversation:
  record: false           # Enable recording
  retention_days: 3       # Auto-delete files older than this

# Logging
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
