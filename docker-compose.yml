services:
  clawlite:
    build: .
    container_name: clawlite-agent
    restart: unless-stopped
    
    # Security settings
    # NOTE: Entrypoint starts as root to run cron daemon, then drops to clawlite user
    # read_only disabled to allow cron to write spool files
    security_opt:
      - no-new-privileges:true
    
    # Resource limits
    mem_limit: 512m
    cpus: 1
    
    # Environment
    env_file:
      - .env
    
    # Volumes
    volumes:
      - ./workspace:/workspace:rw
      - ./skills:/app/skills:ro
      - ./src:/app/src:ro
      - ./prompts:/app/prompts:ro
      - ./config.yaml:/app/config.yaml:ro
      # WhatsApp session persistence
      - ./data/whatsapp:/data/whatsapp:rw
    
    # Tmpfs for writable areas (world-writable where needed)
    tmpfs:
      - /tmp:size=100m,mode=1777
      - /app/__pycache__:size=50m
      - /var/run:size=10m
      - /var/spool/cron:size=10m
      - /run:size=10m
    
    # Network - needs access to Ollama and Telegram API
    # Add extra_hosts if Ollama is on a different machine:
    # extra_hosts:
    #   - "ollama-host:192.168.1.100"
