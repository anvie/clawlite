# ClawLite Configuration
# Environment override: CLAWLITE_CONFIG=/path/to/config.yaml

# LLM settings
llm:
  provider: ollama
  model: llama3.2:3b
  host: http://localhost:11434
  timeout: 60

# Agent behavior
agent:
  max_iterations: 10
  tool_timeout: 30        # seconds per tool execution
  total_timeout: 300      # 5 min max per conversation turn
  retry_attempts: 3       # LLM retry attempts

# Tool settings
tools:
  # Allowed tools (empty = all tools enabled)
  # Example: only enable specific tools
  # allowed:
  #   - read_file
  #   - write_file
  #   - web_search
  allowed: []
  
  # Per-tool configuration
  options:
    web_search:
      max_results: 5
    web_fetch:
      max_chars: 10000

# Channel settings
channels:
  telegram:
    enabled: true
  whatsapp:
    enabled: false

# Logging
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
