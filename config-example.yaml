# ========================================
# ClawLite Configuration
# ========================================
# Copy this file to config.yaml and customize.
# Secrets (API keys, tokens) go in .env file.

# LLM settings
llm:
  # Provider: ollama | openrouter | llama-server | anthropic
  # - ollama: Ollama server (native /api/generate endpoint)
  # - openrouter: OpenRouter API (OpenAI-compatible)
  # - llama-server: llama.cpp server (OpenAI-compatible, same protocol as openrouter)
  # - anthropic: Anthropic Claude API
  provider: ollama
  
  # Model name (provider-specific)
  # Ollama: llama3.2:3b, qwen2.5:7b, etc.
  # OpenRouter: google/gemini-2.0-flash-001, anthropic/claude-3.5-sonnet, etc.
  # llama-server: model loaded by llama-server (usually ignored)
  # Anthropic: claude-sonnet-4-20250514, claude-3-5-haiku-20241022, etc.
  model: llama3.2:3b
  
  # Base URL for the LLM API
  # Ollama: http://localhost:11434
  # OpenRouter: https://openrouter.ai/api/v1 (default, or custom)
  # llama-server: http://localhost:8080/v1
  # Anthropic: https://api.anthropic.com (default)
  base_url: http://localhost:11434
  
  # Request timeout in seconds
  timeout: 60
  
  # Anthropic-specific settings
  # extended_thinking: true
  # thinking_budget: 10000
  
  # llama-server / Qwen3.5 thinking toggle
  # enable_thinking: true

# Translation layer (ID <-> EN)
# Useful for models that perform better in English
translation:
  enabled: false
  api_url: http://127.0.0.1:7655
  # Source language for user messages
  user_lang: ind_Latn
  # Target language for LLM (translate user -> this)
  llm_lang: eng_Latn

# Access control
access:
  # Allowed users (empty = everyone allowed)
  # Use prefixed IDs: tg_<id> for Telegram, wa_<id> for WhatsApp
  # Example: ["tg_123456", "wa_628123456789"]
  allowed_users: []
  
  # Admin users (bypass all restrictions)
  # Admins can use all tools regardless of tools.allowed
  admins: []

# Channel settings
channels:
  telegram:
    enabled: true
  whatsapp:
    enabled: false
    session_dir: /data/whatsapp

# Agent behavior
agent:
  max_iterations: 10      # Max tool calls per turn
  tool_timeout: 30        # Seconds per tool execution
  total_timeout: 300      # 5 min max per conversation turn
  retry_attempts: 3       # LLM retry on failure
  show_tool_calls: false  # Show raw tool_call JSON in stream (debug mode)
  debug_tool_errors: true  # Send failed tool calls as separate ⚠️ message (Telegram only)

# Tool settings
tools:
  # Allowed tools (empty = all enabled)
  # Admins bypass this restriction
  allowed: []
  
  # Per-tool options
  options:
    web_search:
      max_results: 5
    web_fetch:
      max_chars: 10000

# Conversation persistence
conversation:
  record: true            # Save conversations to files
  retention_days: 7       # Auto-delete old files

# API server
api:
  port: 8080

# Logging
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
