# ClawLite Configuration - General Assistant
# All settings here, secrets go in .env

# LLM settings (API keys in .env)
llm:
  provider: llama-server  # ollama | openrouter | anthropic | vllm | llama-server
  timeout: 120
  model: Qwen3.5-27B-Claude-Opus-Distilled-Q5_K_M
  # llama.cpp server on Mars
  base_url: http://192.168.1.7:8080/v1
  enable_thinking: true
  temperature: 0.7
  top_p: 0.9
  vision: true  # Qwen3.5-27B supports vision with mmproj

# Access control
access:
  allowed_users: []  # empty = everyone
  admins: []

# Channel settings
channels:
  telegram:
    enabled: true
  whatsapp:
    enabled: false
    session_dir: /data/whatsapp

# Agent behavior
agent:
  max_iterations: 10
  tool_timeout: 30
  total_timeout: 300

# Tool filtering - all tools enabled for general use
tools:
  allowed: []  # empty = all tools

# Conversation persistence
conversation:
  record: true
  retention_days: 7

# API server
api:
  port: 8081

# Logging
logging:
  level: INFO
