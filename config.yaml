# ClawLite Configuration
# Environment override: CLAWLITE_CONFIG=/path/to/config.yaml

# Access control
access:
  # Allowed users (empty = all allowed, list = only those)
  # Use prefixed IDs: tg_<id> for Telegram, wa_<id> for WhatsApp
  allowed_users: []
  
  # Admin users (always allowed + bypass tool restrictions)
  # Example: ["tg_123456", "wa_628123456"]
  admins: []

# LLM settings
llm:
  # Provider: ollama | openrouter | llama-server | anthropic
  provider: llama-server
  model: Qwen3.5-27B-Claude-Opus-Distilled-Q5_K_M
  base_url: http://192.168.1.7:8080/v1
  timeout: 120

# Agent behavior
agent:
  max_iterations: 10
  tool_timeout: 30        # seconds per tool execution
  total_timeout: 300      # 5 min max per conversation turn
  retry_attempts: 3       # LLM retry attempts
  show_tool_calls: false  # Show raw tool_call JSON in stream (debug mode)

# Tool settings
tools:
  # Allowed tools (empty = all tools enabled)
  # Example: only enable specific tools
  # allowed:
  #   - read_file
  #   - write_file
  #   - web_search
  allowed: []
  
  # Per-tool configuration
  options:
    web_search:
      max_results: 5
    web_fetch:
      max_chars: 10000

# Channel settings
channels:
  telegram:
    enabled: true
  whatsapp:
    enabled: false

# Conversation persistence
conversation:
  record: true           # Enable recording (default OFF)
  retention_days: 3       # Auto-delete files older than this

# Logging
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR

# Translation layer
translation:
  enabled: true
  api_url: http://host.docker.internal:7655
  user_lang: ind_Latn
  llm_lang: eng_Latn
